# 本地一键启动 YApi + MongoDB（在仓库根目录执行）
# 1. cp server/config.docker.example.json server/config.json
# 2. docker compose -f deploy/docker-compose.yml up -d --build
# 3. docker compose -f deploy/docker-compose.yml exec yapi npm run install-server -w yapi-server

services:
  mongo:
    image: mongo:4.4
    restart: unless-stopped
    volumes:
      - yapi_mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  yapi:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      YAPI_API_URL: "http://127.0.0.1:3000"
    volumes:
      - ../server/config.json:/yapi/server/config.json:ro
      - yapi_runtime:/yapi/server
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  yapi_mongo_data:
  yapi_runtime:
