# 本地一键启动 YApi + PostgreSQL（在仓库根目录执行）
# 1. cp server/config.docker.example.json server/config.json
# 2. docker compose -f deploy/docker-compose.yml up -d --build
# 3. docker compose -f deploy/docker-compose.yml exec yapi npm run install-server -w yapi-server

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: yapi
      POSTGRES_PASSWORD: yapi
      POSTGRES_DB: yapi
    volumes:
      - yapi_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yapi -d yapi"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  yapi:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PG_HOST: postgres
      PG_PORT: "5432"
      YAPI_API_URL: "http://127.0.0.1:3001"
    volumes:
      - ../server/config.json:/yapi/server/config.json:ro
      - yapi_runtime:/yapi/server
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  yapi_pg_data:
  yapi_runtime:
