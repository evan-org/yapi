name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  test-server:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspaces
        run: npm install --legacy-peer-deps

      - name: Typecheck server
        run: npm run typecheck:server

      - name: Run server tests
        run: npm run test:server
        env:
          CI: "true"
          YAPI_PORT: "3001"
          YAPI_ADMIN_ACCOUNT: admin@admin.com
          YAPI_DB_HOST: "127.0.0.1"
          YAPI_DB_PORT: "27017"
          YAPI_DB_NAME: yapi_ci
          YAPI_MAIL_ENABLE: "false"

  build-client:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspaces
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build
        env:
          CI: "true"

      - name: Typecheck client
        run: npm run typecheck:client

      - name: Lint client
        run: npm run lint:client
