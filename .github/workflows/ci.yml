name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  test-server:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run server tests
        run: npm run test:server

  build-client:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Prepare config
        run: cp config_example.json config.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Next.js client dependencies
        run: npm ci --legacy-peer-deps
        working-directory: client

      - name: Build frontend (Next.js)
        run: npm run build
        env:
          CI: "true"

      - name: Verify Next.js build output
        run: node scripts/verify-next-build.js

      - name: Lint Next.js client
        run: npm run lint:client
