name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  test-server:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: vendors

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: vendors/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run server tests
        run: npm run test:server

  build-client:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: vendors

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: vendors/package-lock.json

      - name: Prepare config
        run: cp config_example.json ../config.json
        working-directory: vendors

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build
        env:
          CI: "true"
          DISABLE_ESLINT_PLUGIN: "true"
          GENERATE_SOURCEMAP: "false"

      - name: Verify build output
        run: node scripts/verify-build.js
